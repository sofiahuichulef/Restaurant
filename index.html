    <!-- Formulario de pre-inscripción -->
<div class="d-flex justify-content-center align-items-center mt-4">
    <div id="title-form" class="card p-4">
        <h4 id="subtitle-form" class="text-center mb-4">
            Reserva tu mesa</h4>
        <form>
            <div class="mb-3">
                <label for="nombre" class="form-label">Nombre</label>
                <input type="text" class="form-control" id="nombre">
            </div>
            <div class="mb-3">
                <label for="apellido" class="form-label">Apellido</label>
                <input type="text" class="form-control" id="apellido">
            </div>
            <div class="mb-3">
                <label for="correo" class="form-label">Correo Electrónico</label>
                <input type="email" class="form-control" id="correo">
            </div>
            <div class="mb-3">
                <label for="celular" class="form-label">Celular</label>
                <input type="text" class="form-control" id="celular">
            </div>
            <div class="mb-3">
                <label for="horario" class="form-label">Horario</label>
                <select class="form-control" id="horario">
                    <option value="" disabled selected>Selecciona un horario</option>
                    <option>12:00 PM - 2:00 PM</option>
                    <option>2:00 PM - 4:00 PM</option>
                    <option>4:00 PM - 6:00 PM</option>
                    <option>6:00 PM - 8:00 PM</option>
                    <option>8:00 PM - 10:00 PM</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="personas" class="form-label">Número de Personas</label>
                <input type="number" class="form-control" id="personas" min="1" max="20">
            </div>
            <div class="mb-3">
                <label for="fecha" class="form-label">Fecha</label>
                <input type="date" class="form-control" id="fecha">
            </div>

          <button type="button"
                class="btn btn-dark w-100"
                onclick="alert('¡Gracias por tu reserva!')">
                Reservar Mesa
            </button>
        </form>
</div>
